# RSPRecomp configuration for the Mischief Makers (US 1.1) audio microcode.
#
# The game ships the standard Nintendo "aspMain" audio RSP ucode. Its text blob
# lives in the US 1.1 ROM at offset 0xBCAB0 (size 0xE20 == 3616 bytes), proven
# by byte-exact match of the decomp's assets/rsp/aspMain.textbin.bin against
# baserom.us1.z64 (see PHASE2_NOTES_w2.md for the full evidence table).
#
# aspMain has no overlay slots (unlike naudio); it is a single flat IMEM image,
# so this config needs only the text descriptor + the standard IMEM base address.
#
# The same builder-supplied US 1.1 ROM feeds the main recompiler and RSPRecomp.

text_offset = 0xBCAB0
text_size = 0xE20
# text_address MUST be 0x04001080, NOT 0x04001000. The aspMain binary (a stock
# Nintendo SDK-2.0 audio ucode) is assembled for IMEM base 0x1080: the data
# blob's command-dispatch table (DMEM +0x10) and every j/jal target in the text
# encode absolute IMEM addresses whose lowest handler, cmd_SPNOOP, lives at
# 0x1118 (= text file offset 0x98 + 0x1080). With base 0x1000, RSPRecomp maps
# every absolute address 0x80 too low, so the dispatch `jr` and the handlers'
# `j 0x1118` "continue" jump land in the wrong code (the DMA helper tail), the
# entry `jal 0x1150` (the ucode's own first-chunk prefetch) is misrouted, and the
# command stream never advances — see PHASE4_NOTES_a.md.
text_address = 0x04001080
rom_file_path = "input/troublemakers.us1.z64"
output_file_path = "src/rsp/generated/aspMain.cpp"
output_function_name = "aspMain"

# Indirect branch (jump-table) targets that static control-flow analysis can't
# discover are OMITTED here. aspMain is data-driven: a few `jr` instructions
# branch to addresses computed at runtime from small jump tables in DMEM.
# RSPRecomp only auto-collects indirect targets from linking branches (jal/
# jalr), so an unlisted target prints "Unhandled jump target" and aborts the
# task at *runtime* — not a build-gate concern (compilation succeeds without
# them). Supplying wrong targets is worse than omitting them: any target that
# doesn't coincide with a real instruction vram emits a `goto L_XXXX` with no
# matching label and breaks the build. The reference (Zelda64Recomp) lists 24
# targets, but those are for the 0x1000-byte MM aspMain; this game's aspMain is
# 0xE20 bytes (vram span 0x1000-0x1E20), so several of MM's targets (0x1F80,
# 0x1EF8, 0x1E7C, ...) fall outside the text and must NOT be reused. Deriving
# the correct set for *this* binary is a Phase-3 runtime-correctness follow-up
# (run the ucode, dump the jump-table targets, add them here).

# Jump-table targets. The only indirect dispatch in this ucode is `jr $2` at the
# command loop (IMEM 0x1108); its 16 targets are exactly the dispatch table at
# DMEM +0x10 in the data blob (big-endian u16 IMEM addresses). `jr $5`/`jr $31`
# are subroutine returns. With text base 0x1080 the dispatch entries are
# 0x1118,0x1470,0x11DC,0x1B38,0x1214,0x187C,0x1254,0x12D0,0x12EC,0x1328,
# 0x140C,0x1294,0x1E24,0x138C,0x170C,0x144C. The jr $5 (prefetch) return points
# are 0x10C0 (entry-jal return) and 0x1130 (cmd_SPNOOP jal return). Extra labels
# that are never jumped to are harmless (they just create unused goto labels).
extra_indirect_branch_targets = [0x10C0, 0x1130, 0x1118, 0x1470, 0x11DC, 0x1B38, 0x1214, 0x187C, 0x1254, 0x12D0, 0x12EC, 0x1328, 0x140C, 0x1294, 0x1E24, 0x138C, 0x170C, 0x144C]
