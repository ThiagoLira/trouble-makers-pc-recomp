# CI builds: Linux (+ AppImage) and Windows. Modeled on the reference
# project's validate.yml (Zelda64Recomp).
#
# UNTESTED SCAFFOLD — written offline; expect to iterate on the first runs.
#
# The build needs `input/troublemakers.elf` (the byte-perfect decomp build:
# it contains the game's code, so it must NOT live in this repository, same
# policy as the ROM). Provide it the way the reference provides its private
# assets: a private repo cloned with a PAT. Set these repository secrets:
#   TM_ASSETS_REPO   - e.g. https://x-access-token:<PAT>@github.com/<you>/<private-assets>.git
#                      containing troublemakers.elf and aspMain.cpp (RSPRecomp output)
#                      at its root — the raw ROM never goes to GitHub.
# Jobs are skipped when the secret is missing (forks, PRs from outside).
#
# Two known deltas from a local dev checkout:
#  - lib/N64ModernRuntime is pinned to upstream; the local tm-fixes branch ==
#    pin + patches/N64ModernRuntime/*.patch, so CI applies those patches.
#  - lib/rt64 is a nested repo, not a submodule: CI clones the pinned fork
#    and applies patches/rt64/*.patch.
name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]        # a version tag builds + publishes a release (see the `release` job)
  pull_request:
  workflow_dispatch:

env:
  RT64_REPO: https://github.com/rt64/rt64.git
  RT64_COMMIT: 23cab603  # pinned fork commit; see src/graphics/CMakeLists.txt

jobs:
  build-linux:
    # Oldest runner available: the AppImage only runs on glibc >= the build
    # machine's. (The reference uses ubuntu-18.04 via custom runners; on
    # public GitHub runners ubuntu-22.04 is the floor.)
    runs-on: ubuntu-22.04
    if: ${{ vars.HAS_ASSETS != '' || github.event_name == 'workflow_dispatch' }}
    env:
      # GCC 11 miscompiles translated dialogue/display-list code. Keep the
      # Ubuntu 22.04 glibc baseline, but use Jammy's supported GCC 12 package.
      CC: gcc-12
      CXX: g++-12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      # No libsdl2-dev (SDL2 is built from source below — 22.04's 2.0.20 is
      # too old) and no GTK/librsvg (file dialogs go through
      # xdg-desktop-portal via dbus, so the AppImage bundles no GTK stack).
      # The libx*/wayland/decor/asound/pulse/udev -dev packages are SDL2
      # build deps: SDL dlopens them at runtime, but only compiles a backend
      # in when its headers are present.
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-12 g++-12 libvulkan-dev file libdbus-1-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxfixes-dev libxi-dev libxss-dev \
            libxkbcommon-dev libwayland-dev wayland-protocols libdecor-0-dev \
            libegl1-mesa-dev libgl1-mesa-dev libgles2-mesa-dev \
            libasound2-dev libpulse-dev libpipewire-0.3-dev libudev-dev
      # Ubuntu 22.04 ships SDL 2.0.20, whose Wayland backend predates the
      # fractional-scaling and libdecor fixes (tiny window, mouse offset on
      # KDE/HiDPI) and whose SDL_VIDEODRIVER doesn't parse fallback lists.
      # Build a current SDL2 so the AppImage bundles it.
      - name: Build SDL2 from source
        run: |
          curl -sSfL https://github.com/libsdl-org/SDL/releases/download/release-2.32.10/SDL2-2.32.10.tar.gz | tar xz
          cmake -S SDL2-2.32.10 -B sdl2-build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build sdl2-build -j "$(nproc)"
          sudo cmake --install sdl2-build
          sudo ldconfig
      - name: Fetch private assets (troublemakers.elf, aspMain.cpp)
        run: |
          git clone --depth 1 "${{ secrets.TM_ASSETS_REPO }}" tm-assets
          mkdir -p input src/rsp/generated
          cp tm-assets/troublemakers.elf input/
          # Pregenerated RSP microcode (RSPRecomp needs the raw ROM, which
          # stays off GitHub; regenerate locally with aspMain.us1.rsp.toml)
          cp tm-assets/aspMain.cpp src/rsp/generated/
      - name: Apply N64ModernRuntime patches (tm-fixes)
        run: |
          cd lib/N64ModernRuntime
          git apply ../../patches/N64ModernRuntime/*.patch
      - name: Clone + patch RT64
        run: |
          git clone "$RT64_REPO" lib/rt64
          cd lib/rt64
          git checkout "$RT64_COMMIT"
          git submodule update --init --recursive
          git apply ../../patches/rt64/*.patch
      - name: Build N64Recomp and generate RecompiledFuncs
        run: |
          cmake -S tools/N64Recomp -B tools/N64Recomp/build -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build tools/N64Recomp/build --target N64RecompCLI -j "$(nproc)"
          ./tools/N64Recomp/build/N64Recomp troublemakers.us1.toml
      # GCC (not clang): Ubuntu 22.04's libstdc++ declares extern
      # templates for u8string that its .so doesn't ship, and clang then
      # leaves _M_construct<char8_t> undefined at link. GCC 12 also avoids the
      # translated-code corruption reproduced with Jammy's default GCC 11.
      - name: Build troublemakers
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target troublemakers -j "$(nproc)"
      - name: Build AppImage
        run: ./.github/linux/appimage.sh
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: TroubleMakers-AppImage-X64
          path: TroubleMakers-*.AppImage

  build-windows:
    runs-on: windows-latest
    if: ${{ vars.HAS_ASSETS != '' || github.event_name == 'workflow_dispatch' }}
    steps:
      # The runner's global autocrlf=true rewrites checked-out files (incl.
      # our .patch files and the submodule sources) to CRLF, and git apply
      # then can't match the LF sources. Disable BEFORE any checkout.
      - name: Force LF checkouts
        run: git config --global core.autocrlf false
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install dependencies
        run: choco install ninja
      - name: Configure Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
      # shell: bash (Git Bash on the runner) for glob expansion and syntax
      # shared with the Linux job — PowerShell passes *.patch to git literally.
      - name: Fetch private assets (troublemakers.elf, aspMain.cpp)
        shell: bash
        run: |
          git clone --depth 1 "${{ secrets.TM_ASSETS_REPO }}" tm-assets
          mkdir -p input src/rsp/generated
          cp tm-assets/troublemakers.elf input/
          # Pregenerated RSP microcode (RSPRecomp needs the raw ROM, which
          # stays off GitHub; regenerate locally with aspMain.us1.rsp.toml)
          cp tm-assets/aspMain.cpp src/rsp/generated/
      - name: Apply N64ModernRuntime patches (tm-fixes)
        shell: bash
        run: |
          cd lib/N64ModernRuntime
          git apply ../../patches/N64ModernRuntime/*.patch
      - name: Clone + patch RT64
        shell: bash
        run: |
          # autocrlf=false: Windows git otherwise checks out CRLF and the
          # LF patch no longer applies
          git clone -c core.autocrlf=false "$RT64_REPO" lib/rt64
          cd lib/rt64
          git checkout "$RT64_COMMIT"
          git submodule update --init --recursive
          git apply ../../patches/rt64/*.patch
      - name: Build N64Recomp and generate RecompiledFuncs
        shell: bash
        run: |
          cmake -S tools/N64Recomp -B tools/N64Recomp/build -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build tools/N64Recomp/build --target N64RecompCLI -j
          ./tools/N64Recomp/build/N64Recomp.exe troublemakers.us1.toml
      - name: Build troublemakers (clang-cl)
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl
          cmake --build build --target troublemakers -j
      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/src/game/troublemakers.exe dist/
          Copy-Item build/src/game/*.dll dist/
          Compress-Archive -Path dist/* -DestinationPath TroubleMakers-Windows-X64.zip -Force
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: TroubleMakers-Windows-X64
          path: TroubleMakers-Windows-X64.zip

  # Publish a GitHub Release with both artifacts when a version tag is pushed.
  # Usage: `git tag v0.3.0 && git push origin v0.3.0` — build-linux/build-windows
  # run as usual (HAS_ASSETS gate already passes on tag pushes), then this job
  # attaches their outputs to a prerelease with auto-generated notes.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write        # GITHUB_TOKEN needs this to create the release
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Trouble Makers $GITHUB_REF_NAME" \
            --generate-notes \
            --prerelease \
            artifacts/TroubleMakers-AppImage-X64/TroubleMakers-x86_64.AppImage \
            artifacts/TroubleMakers-Windows-X64/TroubleMakers-Windows-X64.zip
