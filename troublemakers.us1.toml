    { func = "func_800450D0", vram = 0x800450F0, value = 0x3C188042 },
    { func = "func_8004512C", vram = 0x8004514C, value = 0x3C188042 },
    { func = "func_80045188", vram = 0x800451A8, value = 0x3C188042 },
    { func = "func_800451E4", vram = 0x80045380, value = 0x3C128042 },
    { func = "func_800451E4", vram = 0x80045498, value = 0x3C128042 },

    # Clan blocks are emitted as RDP texture rectangles. The original draw
    # path clamps every negative X coordinate to zero and advances texture S,
    # physically cutting otherwise-live blocks at the 4:3 left edge. Always
    # take the unclipped coordinate/zero-S paths; vertical clipping is kept.
    { func = "func_8000DD6C", vram = 0x8000E22C, value = 0x10000003 },
    { func = "func_8000DD6C", vram = 0x8000E274, value = 0x10000003 },
    { func = "func_8000DD6C", vram = 0x8000E2C4, value = 0x10000003 },
