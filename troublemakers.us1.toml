# Widescreen: widen the per-frame view-cull rectangle at translation time.
# The game culls actor/sprite DRAWING against a rect it recomputes every
# frame as camX +/- 0x90 (144px) horizontally (Camera_UpdateViewBounds at
# 0x800462F0, plus a LEFT re-set in func_800463C0). Patching the addiu
# immediates to +/- 0x180 (384px) makes wing content update, and keeps large
# actors/geometry-backed props alive until their full bounds leave the screen
# deterministically — the previous host-thread mirror raced the game's
# per-frame rewrite and sprites flickered in the wings. In 4:3 the extra
# margin only draws objects RT64 clips; verified no gameplay impact.
# Y bounds (+/- 0x70) are left untouched.
[patches]
instruction = [
    { func = "Camera_UpdateViewBounds", vram = 0x80046370, value = 0x2443FE80 }, # LEFT  = camX - 0x180
    { func = "Camera_UpdateViewBounds", vram = 0x80046398, value = 0x24440180 }, # RIGHT = camX + 0x180
    { func = "func_800463C0",           vram = 0x800463E0, value = 0x25CFFE80 }, # LEFT re-set = camX - 0x180

    # REAL-CONTENT WIDESCREEN — scrolling background band (func_80082820).
    # The band is a 7-row x 10-col grid of 32px CI8 tiles (exactly 320px) read
    # from the dst array D_80180D90 (140 s32 slots, filled 70 at stride 10).
    # Its ultimate source is the level's backdrop tilemap: a 16x16 byte grid
    # that WRAPS on both axes (col = (srcX>>5)&0xF, rowblk = (srcY>>1)&0xF0),
    # so tiles 5 columns beyond each 4:3 edge are genuine neighboring map
    # tiles, not mirrored/stretched pixels. These 5 instruction patches widen
    # the draw loop to 20 columns starting 5 left (cols -5..14) with an 80-byte
    # (20-slot) row stride and the two 4:3 left-edge assumptions removed; the
    # entry hook below rebuilds D_80180D90 at stride 20 with all 20 real
    # columns. Fill path + every word here ROM-verified (Phase 8 forensics).
    { func = "func_80082820", vram = 0x800829D0, value = 0x2414000F }, # col limit s4 10 -> 15
    { func = "func_80082820", vram = 0x80082A08, value = 0x240CFFFB }, # col start t4 0 -> -5
    { func = "func_80082820", vram = 0x80082A20, value = 0x24F900C0 }, # left-edge skip 0x20 -> 0xC0
    { func = "func_80082820", vram = 0x80082B24, value = 0x04010003 }, # drop max(0,upper_x) clamp
    # The original x<0 path compensated for clipping by starting texture S at
    # -x. Wing rectangles are no longer clipped, so their S must remain zero.
    { func = "func_80082820", vram = 0x80082B70, value = 0x10000003 }, # always take S=0 path
    { func = "func_80082820", vram = 0x80082A00, value = 0x00197900 }, # dst row stride <<3 -> <<4 (80B)
    # Clamp fractional high-resolution samples at the edge of each 32x32
    # slice instead of wrapping them to texel 0 of that same slice. The next
    # rectangle supplies the genuine neighboring map tile.
    { func = "func_80082820", vram = 0x80082AAC, value = 0x3C190009 }, # render tile CMT=CLAMP
    { func = "func_80082820", vram = 0x80082ABC, value = 0x37394250 }, # render tile CMS=CLAMP

    # REAL-CONTENT WIDESCREEN — shared static tile-grid draw func_80082380
    # (midground D_80180930 / env D_80180B60 / static-bg D_80180D90 / possible
    # overlay callers). Loop is hardcoded 7 rows x 10 cols reading a stride-10
    # 70-slot array, so EVERY caller passes that layout. Same 10->20 widening
    # as func_80082820; the entry hook below repacks WHATEVER buffer arrives
    # into scratch at stride 20 (catch-all — the first attempt guarded only the
    # 3 known buffers, and an unlisted overlay caller's stride-10 data was
    # misread as stride-20 = stale-texture garbage in the wings). Known layers
    # get real map content in the wings; unknown callers get black wings and a
    # byte-identical center. All 5 words ROM-verified.
    { func = "func_80082380", vram = 0x8008252C, value = 0x2413000F }, # col limit s3 10 -> 15
    { func = "func_80082380", vram = 0x80082534, value = 0x240DFFFB }, # col start t5 0 -> -5
    { func = "func_80082380", vram = 0x8008254C, value = 0x24EE00C0 }, # left-edge skip 0x20 -> 0xC0
    { func = "func_80082380", vram = 0x80082644, value = 0x04010003 }, # drop max(0,upper_x) clamp
    { func = "func_80082380", vram = 0x80082690, value = 0x10000003 }, # unclipped wing tile starts at S=0
    { func = "func_80082380", vram = 0x800826F4, value = 0x27190050 }, # dst row stride 0x28 -> 0x50 (20 slots)
    { func = "func_80082380", vram = 0x800825DC, value = 0x3C180009 }, # render tile CMT=CLAMP
    { func = "func_80082380", vram = 0x800825EC, value = 0x37184250 }, # render tile CMS=CLAMP

    # ENTITY POP-IN — the view-cull rect above is only one of the game's
    # visibility systems. Three more windows still used 4:3-sized X margins,
    # so objects appeared/vanished visibly inside the 16:9 wings (needs
    # ~+/-214px). Y margins untouched everywhere (vertical view unchanged).
    # All words verified against the community decomp asm.
    #
    # func_80016D94: per-frame despawner. Kills ACTOR_FLAG_ONSCREEN_ONLY
    # actors (projectiles, particles, drops) outside camX +/- 0xD0 — INSIDE
    # the wings. Widen to +/-0x1C0, keeping 64px slack over the 0x180 cull.
    # Pure despawn (slot reclamation); widening only delays cleanup.
    { func = "func_80016D94", vram = 0x80016E20, value = 0x28C1FE40 }, # slti kill-left  -0xD0 -> -0x1C0
    { func = "func_80016D94", vram = 0x80016E28, value = 0x28C101C1 }, # slti kill-right  0xD1 ->  0x1C1

    # func_8001DC60/func_8001DE30: map-authored actor prefetch. Freefall and
    # Clan Pot Shake stream fixed actor slots through an X-only 32px ring.
    # Preserve the original relationship to the shared actor-list cull:
    # inner=cull-0x10 and outer=cull+0x10, now +/-0x170 and +/-0x190 around
    # the widened +/-0x180 draw window. The separate +/-0x1C0 despawner still
    # gives 48px of cleanup hysteresis. Vertical bounds remain unchanged.
    { func = "func_8001DC60", vram = 0x8001DC8C, value = 0x2457FE70 }, # initial left       -0xD0 -> -0x190
    { func = "func_8001DC60", vram = 0x8001DC90, value = 0x24540190 }, # initial right       0xD0 ->  0x190
    { func = "func_8001DE30", vram = 0x8001DE7C, value = 0x2458FE90 }, # Y-sort inner left  -0xB0 -> -0x170
    { func = "func_8001DE30", vram = 0x8001DE80, value = 0x24590170 }, # Y-sort inner right  0xB0 ->  0x170
    { func = "func_8001DE30", vram = 0x8001DEA0, value = 0x2454FE70 }, # Y-sort outer left  -0xD0 -> -0x190
    { func = "func_8001DE30", vram = 0x8001DEA4, value = 0x24560190 }, # Y-sort outer right  0xD0 ->  0x190
    { func = "func_8001DE30", vram = 0x8001E0A0, value = 0x2458FE90 }, # X-sort inner left  -0xB0 -> -0x170
    { func = "func_8001DE30", vram = 0x8001E0A4, value = 0x24590170 }, # X-sort inner right  0xB0 ->  0x170
    { func = "func_8001DE30", vram = 0x8001E0C4, value = 0x24560190 }, # X-sort outer right  0xD0 ->  0x190
    { func = "func_8001DE30", vram = 0x8001E0E0, value = 0x2454FE70 }, # X-sort outer left   -0xD0 -> -0x190

    # func_800451E4: gem/prop sprite windowing. Rebuilt statelessly from the
    # world-item table every frame; an item only gets one of the 64 sprite
    # slots inside camX +/- 0xA8 (168px) — pops ~46px inside the wing. Widen
    # both the normal and alternate paths to +/-0x1C0 so wide props do not
    # lose their slot while part of their sprite is still visible.
    { func = "func_800451E4", vram = 0x80045238, value = 0x2457FE40 }, # alternate window-left  -0x100 -> -0x1C0
    { func = "func_800451E4", vram = 0x8004523C, value = 0x245E01C0 }, # alternate window-right  0x100 ->  0x1C0
    { func = "func_800451E4", vram = 0x8004527C, value = 0x2457FE40 }, # normal window-left     -0xA8 -> -0x1C0
    { func = "func_800451E4", vram = 0x80045280, value = 0x245E01C0 }, # normal window-right     0xA8 ->  0x1C0

    # The widened world window can contain more than the original 64 live
    # clan-block/prop records (Meet Calina peaks at 97). Move the 0x90-byte
    # record array into unused expansion RDRAM and raise every loader, draw,
    # cleanup, and reset bound together to 128. All producers and consumers of
    # D_801069E0 are repointed below; the old array remains untouched next to
    # the game's map data.
    { func = "func_800451E4", vram = 0x80045370, value = 0x28610080 }, # load cap 64 -> 128
    { func = "func_800451E4", vram = 0x80045488, value = 0x28610080 }, # scan cap 64 -> 128
    { func = "func_800451E4", vram = 0x8004549C, value = 0x28610080 }, # cleanup cap 64 -> 128
    { func = "func_800451E4", vram = 0x800454B8, value = 0x28610080 }, # cleanup loop 64 -> 128
    { func = "func_8000DD6C", vram = 0x8000E014, value = 0x29E10080 }, # simple draw loop 64 -> 128
    { func = "func_8000DD6C", vram = 0x8000EA4C, value = 0x29C10080 }, # typed draw loop 64 -> 128
    { func = "func_800230B8", vram = 0x8002310C, value = 0x29010080 }, # reset loop 64 -> 128

    # D_801069E0 -> 0x804269E0. Keeping the low 0x69E0 bits means every site
    # changes only its LUI. This list includes drawing, collision, positional
    # audio, record constructors, loader cleanup, and stage reset.
    { func = "Sound_PlaySfxAtObject", vram = 0x80003834, value = 0x3C188042 },
    { func = "func_8000DD6C", vram = 0x8000DE30, value = 0x3C198042 },
    { func = "func_8000DD6C", vram = 0x8000E060, value = 0x3C0F8042 },
    { func = "func_800230B8", vram = 0x800230F0, value = 0x3C038042 },
    { func = "func_8002FD48", vram = 0x8002FDAC, value = 0x3C0B8042 },
    { func = "func_80044360", vram = 0x80044368, value = 0x3C188042 },
    { func = "func_80044390", vram = 0x800443B0, value = 0x3C188042 },
    { func = "func_80044390", vram = 0x80044420, value = 0x3C198042 },
    { func = "func_80044468", vram = 0x80044488, value = 0x3C188042 },
    { func = "func_80044468", vram = 0x800444F8, value = 0x3C198042 },
    { func = "func_80044540", vram = 0x80044560, value = 0x3C188042 },
    { func = "func_80044540", vram = 0x800445D0, value = 0x3C198042 },
    { func = "func_80044618", vram = 0x80044638, value = 0x3C188042 },
    { func = "func_80044618", vram = 0x800446A8, value = 0x3C198042 },
    { func = "func_800446F0", vram = 0x800446F8, value = 0x3C0F8042 },
    { func = "func_800447AC", vram = 0x800447CC, value = 0x3C188042 },
    { func = "func_800447AC", vram = 0x8004483C, value = 0x3C198042 },
    { func = "func_80044884", vram = 0x800448A4, value = 0x3C188042 },
    { func = "func_80044884", vram = 0x80044914, value = 0x3C198042 },
    { func = "func_8004495C", vram = 0x8004497C, value = 0x3C188042 },
    { func = "func_800449A8", vram = 0x800449B0, value = 0x3C188042 },
    { func = "func_80044A38", vram = 0x80044A58, value = 0x3C188042 },
    { func = "func_80044A84", vram = 0x80044A8C, value = 0x3C188042 },
    { func = "func_80044B00", vram = 0x80044B08, value = 0x3C188042 },
    { func = "func_80044B7C", vram = 0x80044B9C, value = 0x3C188042 },
    { func = "func_80044BD8", vram = 0x80044BF8, value = 0x3C188042 },
    { func = "func_80044C34", vram = 0x80044C54, value = 0x3C188042 },
    { func = "func_80044C90", vram = 0x80044CB0, value = 0x3C188042 },
