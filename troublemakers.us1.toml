# N64Recomp configuration for Mischief Makers (US 1.1)
# input elf: the byte-perfect decomp build from trouble-makers-ai-recomp
[input]
entrypoint = 0x80000400
elf_path = "input/troublemakers.elf"
output_func_path = "RecompiledFuncs"

# Static (file-local) functions whose symbols the decomp ELF drops — the
# recompiler sees a symbol-table hole and skips their code, but the game
# installs several of them as function POINTERS (libaudio sequencer
# handlers, rmon internals), so they must be translated. Names/addrs from
# the decomp's symbol_addrs; sizes from the decomp build's .o files
# (fallback: gap to the next known function).
manual_funcs = [
    { name = "__CSPVoiceHandler", section = ".main", vram = 0x8009C6AC, size = 0x82C },  # gap
    { name = "__CSPHandleNextSeqEvent", section = ".main", vram = 0x8009CF78, size = 0x11C },  # gap
