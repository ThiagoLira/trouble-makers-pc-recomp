# Widescreen: widen the per-frame view-cull rectangle at translation time.
# The game culls actor/sprite DRAWING against a rect it recomputes every
# frame as camX +/- 0x90 (144px) horizontally (Camera_UpdateViewBounds at
# 0x800462F0, plus a LEFT re-set in func_800463C0). Patching the addiu
# immediates to +/- 0x120 (288px, enough for 21:9) makes wing content update
# deterministically — the previous host-thread mirror raced the game's
# per-frame rewrite and sprites flickered in the wings. In 4:3 the extra
# margin only draws objects RT64 clips; verified no gameplay impact.
# Y bounds (+/- 0x70) are left untouched.
[patches]
instruction = [
    { func = "Camera_UpdateViewBounds", vram = 0x80046370, value = 0x2443FEE0 }, # LEFT  = camX - 0x120
    { func = "Camera_UpdateViewBounds", vram = 0x80046398, value = 0x24440120 }, # RIGHT = camX + 0x120
    { func = "func_800463C0",           vram = 0x800463E0, value = 0x25CFFEE0 }, # LEFT re-set = camX - 0x120

    # EXPERIMENTAL (branch widescreen-backdrop): extend the backdrop tile
    # band into the widescreen wings — STATIC path (func_80082380) only; the
    # scrolling path (func_80082820) is deferred (the parked draft's arg-
    # register claims for it were wrong; see drafts/). The band is a 7x10
    # grid of 32px tiles (exactly 320px wide) drawn from a caller-passed
    # tile array ($a3). The entry hook below repacks that array into SCRATCH
    # rdram as 7x20 with horizontal EDGE REFLECTION (mirror the columns nearest each edge; modulo wrap mapped empty/unrelated map columns into the wings — asymmetric black + spliced-seam artifacts) and repoints ctx->r7 at the
    # scratch copy — no game memory is written. These five instruction
    # patches widen the draw loop to match (cols -5..14, 80-byte row stride,
    # wing-friendly edge handling). All original words ROM-verified.
    { func = "func_80082380", vram = 0x8008252C, value = 0x2413000F }, # col stop 10 -> 15
    { func = "func_80082380", vram = 0x80082534, value = 0x240DFFFB }, # col start 0 -> -5
    { func = "func_80082380", vram = 0x8008254C, value = 0x24EE00C0 }, # left-edge skip 0x20 -> 0xC0
    { func = "func_80082380", vram = 0x80082644, value = 0x04010003 }, # drop max(0,x) clamp
    { func = "func_80082380", vram = 0x800826F4, value = 0x27190050 }, # row stride 40 -> 80 bytes

    # Scrolling path (func_80082820) — the one active during gameplay
    # (func_80082F10 selects it when D_800BE6FC != 0). Same widening, all
    # original words asm/ROM-verified (sll x8 -> x16 works because the row
    # register holds row*5: (row*5)<<3 = row*40 -> (row*5)<<4 = row*80).
    { func = "func_80082820", vram = 0x800829D0, value = 0x2414000F }, # col stop 10 -> 15
    { func = "func_80082820", vram = 0x80082A08, value = 0x240CFFFB }, # col start 0 -> -5
    { func = "func_80082820", vram = 0x80082A20, value = 0x24F900C0 }, # left-edge skip 0x20 -> 0xC0
    { func = "func_80082820", vram = 0x80082B24, value = 0x04010003 }, # drop max(0,x) clamp
    { func = "func_80082820", vram = 0x80082A00, value = 0x00197900 }, # row offset (row*5)<<3 -> <<4
]

# Entry hooks: when the incoming tile-array pointer is the Background
# system's shared array D_80180D90 (the ONLY buffer used by the backdrop
# band — both the static and scrolling paths of func_80082F10 feed from it,
# per the Phase 8 layer-log forensics), repack it into scratch rdram (top of
# the committed 512MB) as 7x20 with horizontal EDGE REFLECTION (mirror the columns nearest each edge; modulo wrap mapped empty/unrelated map columns into the wings — asymmetric black + spliced-seam artifacts) + two zeroed
# guard rows, and repoint the argument at the scratch copy. Any other
# caller/buffer passes through untouched — this discrimination is what the
# failed attempt 2 lacked (it repacked every caller's buffer and corrupted
# non-backdrop draws). Static path takes the array in $a3/ctx->r7 (buffer 0x80180B60);
# scrolling path in $a1/ctx->r5 (buffer 0x80180D90) — per a runtime pointer census
# across the full intro/title/demo cycle, each path only ever receives its one buffer (asm-verified; framebuffer is $a0 there).
hook = [
    { func = "func_80082380", text = '{ } if ((uint32_t)ctx->r7 == 0x80180B60u) { gpr b = ctx->r7; gpr s = (gpr)(int32_t)0x9FFFE000; int y; int c; for (y = 0; y < 7; y++) { for (c = 0; c < 20; c++) { int sc = c - 5; int w = sc < 0 ? (-sc - 1) : (sc > 9 ? 19 - sc : sc); if (w < 0) w = 0; if (w > 9) w = 9; MEM_W((y*20 + c)*4, s) = MEM_W((y*10 + w)*4, b); } } for (c = 0; c < 40; c++) { MEM_W((140 + c)*4, s) = 0; } ctx->r7 = s + 20; } }' },
    { func = "func_80082820", text = '{ } if ((uint32_t)ctx->r5 == 0x80180D90u) { gpr b = ctx->r5; gpr s = (gpr)(int32_t)0x9FFFF000; int y; int c; for (y = 0; y < 7; y++) { for (c = 0; c < 20; c++) { int sc = c - 5; int w = sc < 0 ? (-sc - 1) : (sc > 9 ? 19 - sc : sc); if (w < 0) w = 0; if (w > 9) w = 9; MEM_W((y*20 + c)*4, s) = MEM_W((y*10 + w)*4, b); } } for (c = 0; c < 40; c++) { MEM_W((140 + c)*4, s) = 0; } ctx->r5 = s + 20; } }' },
]
