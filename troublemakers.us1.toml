# Widescreen: widen the per-frame view-cull rectangle at translation time.
# The game culls actor/sprite DRAWING against a rect it recomputes every
# frame as camX +/- 0x90 (144px) horizontally (Camera_UpdateViewBounds at
# 0x800462F0, plus a LEFT re-set in func_800463C0). Patching the addiu
# immediates to +/- 0x120 (288px, enough for 21:9) makes wing content update
# deterministically — the previous host-thread mirror raced the game's
# per-frame rewrite and sprites flickered in the wings. In 4:3 the extra
# margin only draws objects RT64 clips; verified no gameplay impact.
# Y bounds (+/- 0x70) are left untouched.
[patches]
instruction = [
    { func = "Camera_UpdateViewBounds", vram = 0x80046370, value = 0x2443FEE0 }, # LEFT  = camX - 0x120
    { func = "Camera_UpdateViewBounds", vram = 0x80046398, value = 0x24440120 }, # RIGHT = camX + 0x120
    { func = "func_800463C0",           vram = 0x800463E0, value = 0x25CFFEE0 }, # LEFT re-set = camX - 0x120

    # REAL-CONTENT WIDESCREEN — scrolling background band (func_80082820).
    # The band is a 7-row x 10-col grid of 32px CI8 tiles (exactly 320px) read
    # from the dst array D_80180D90 (140 s32 slots, filled 70 at stride 10).
    # Its ultimate source is the level's backdrop tilemap: a 16x16 byte grid
    # that WRAPS on both axes (col = (srcX>>5)&0xF, rowblk = (srcY>>1)&0xF0),
    # so tiles 5 columns beyond each 4:3 edge are genuine neighboring map
    # tiles, not mirrored/stretched pixels. These 5 instruction patches widen
    # the draw loop to 20 columns starting 5 left (cols -5..14) with an 80-byte
    # (20-slot) row stride and the two 4:3 left-edge assumptions removed; the
    # entry hook below rebuilds D_80180D90 at stride 20 with all 20 real
    # columns. Fill path + every word here ROM-verified (Phase 8 forensics).
    { func = "func_80082820", vram = 0x800829D0, value = 0x2414000F }, # col limit s4 10 -> 15
    { func = "func_80082820", vram = 0x80082A08, value = 0x240CFFFB }, # col start t4 0 -> -5
    { func = "func_80082820", vram = 0x80082A20, value = 0x24F900C0 }, # left-edge skip 0x20 -> 0xC0
    { func = "func_80082820", vram = 0x80082B24, value = 0x04010003 }, # drop max(0,upper_x) clamp
    { func = "func_80082820", vram = 0x80082A00, value = 0x00197900 }, # dst row stride <<3 -> <<4 (80B)

    # REAL-CONTENT WIDESCREEN — shared static tile-grid draw func_80082380
    # (midground D_80180930 / env D_80180B60 / static-bg D_80180D90 / possible
    # overlay callers). Loop is hardcoded 7 rows x 10 cols reading a stride-10
    # 70-slot array, so EVERY caller passes that layout. Same 10->20 widening
    # as func_80082820; the entry hook below repacks WHATEVER buffer arrives
    # into scratch at stride 20 (catch-all — the first attempt guarded only the
    # 3 known buffers, and an unlisted overlay caller's stride-10 data was
    # misread as stride-20 = stale-texture garbage in the wings). Known layers
    # get real map content in the wings; unknown callers get black wings and a
    # byte-identical center. All 5 words ROM-verified.
    { func = "func_80082380", vram = 0x8008252C, value = 0x2413000F }, # col limit s3 10 -> 15
    { func = "func_80082380", vram = 0x80082534, value = 0x240DFFFB }, # col start t5 0 -> -5
    { func = "func_80082380", vram = 0x8008254C, value = 0x24EE00C0 }, # left-edge skip 0x20 -> 0xC0
    { func = "func_80082380", vram = 0x80082644, value = 0x04010003 }, # drop max(0,upper_x) clamp
    { func = "func_80082380", vram = 0x800826F4, value = 0x27190050 }, # dst row stride 0x28 -> 0x50 (20 slots)
]

# Entry hook on the scrolling-background draw (func_80082820, sole caller
# func_80082F10 always passes D_80180D90). Runs after the game's stride-10
# fill; rebuilds the whole 7x20 grid at stride 20 directly from the wrapping
# 16x16 backdrop tilemap so the 5 wing columns on each side are REAL tiles.
# Center columns (window w=5..14) recompute identically to the game's own
# fill, so with the draw loop clipped to 4:3 (no --widescreen) the visible
# result is byte-identical. Formula (Phase 8 verified):
#   P       = *(u32*)0x80137470                 backdrop map base (16x16 bytes)
#   add     = *(u16*)0x80137478                 per-level tile-id addend (0)
#   texbase = *(u32*)0x80180FC0 (= 0x80380600)  RDP texture-image pool base
#   per row r: sy = (-0xC - *(u16*)0x800BE584) + r*32 ; rowblk = (sy>>1)&0xF0
#              sx0 = (*(u16*)(0x8011D3B0 + r*4) - 2) & 0x1FF   (per-row parallax X)
#   per window col w (0..19, w-5 = camera-relative): srcX = sx0 + (w-5)*32 (+512 to
#              stay positive across one wrap period); col = (srcX>>5)&0xF;
#              tile = map[col + rowblk]; slot = tile ? ((tile+add)<<10)+texbase : 0
# MEM_* are recomp.h's canonical accessors (MEM_BU carries the big-endian ^3,
# matching the original lbu). Reads only the static map + current scroll
# globals, writes only the 140-slot dst array (exactly 7x20) -> no overrun,
# no other buffer touched.
hook = [
    # The game draws 14px/18px black strips at x=0 and x=302 around its
    # original 4:3 safe area. They become seams in an expanded framebuffer.
    # Suppress only those vertical rectangles in widescreen; top/bottom bars
    # and dynamically animated letterboxing remain untouched.
    { func = "Gfx_DrawBorderRect", text = '{ static int wide = -1; if (wide < 0) { extern char* getenv(const char*); char* e = getenv("MM_WIDESCREEN_ACTIVE"); wide = (e && e[0] == 0x31); } extern int mm_widescreen_gameplay_active(uint8_t*); int gamewide = mm_widescreen_gameplay_active(rdram); if (wide && gamewide && (((int32_t)ctx->r5 == 0 && (int32_t)ctx->r7 <= 14) || ((int32_t)ctx->r5 >= 302 && (int32_t)ctx->r7 == 320))) { return; } }' },
    # The primary func_80082380 hook maps the non-scrolling D_80180D90
    # background to the catch-all scratch buffer. Finish its real map-backed
    # wing columns after that entry hook and before the first original opcode.
    { func = "func_80082380", before_vram = 0x80082380, text = '{ extern void mm_widescreen_finish_static_bg(uint8_t*, recomp_context*); mm_widescreen_finish_static_bg(rdram, ctx); }' },
    # The repack hooks below guard incompatible layer layouts discovered during
    # scene coverage. Each incompatible layer is independently disabled so
    # every scene keeps all of its verified map-backed extensions.
    # DEBUG WARP (MM_WARP=<scene id> or exact MM_WARP_STAGE=<row>): the state
    # dispatcher runs every
    # frame; on the first frame the game reaches the title screen (gGameState
    # 0x800BE4F0 == 2), resolve the scene's complete progression-table row and
    # drop into LOADING (5, gGameStateSubState 0) — matching the stage-select
    # menu instead of reusing stale map/overlay assets. Skips the intro/attract
    # wait for widescreen iteration. Optional MM_WARP_AT overrides the trigger
    # state (default 2 = title; 1 = intro to skip more).
    { func = "func_80001670", text = '{ extern void mm_widescreen_sync_mode(uint8_t*); mm_widescreen_sync_mode(rdram); static int fc = 0; static int warped = 0; fc++; { extern char* getenv(const char*); char* te = getenv("MM_TEST_AUTO_ADVANCE"); if (te && te[0] == 0x31 && (fc % 120) == 0 && MEM_HU(0, (gpr)(int32_t)0x800BE4F0) == 6) { int buttons = MEM_HU(0, (gpr)(int32_t)0x800BE52C) | MEM_HU(0, (gpr)(int32_t)0x800BE530); MEM_H(0, (gpr)(int32_t)0x800BE4FC) = MEM_HU(0, (gpr)(int32_t)0x800BE4FC) | buttons; MEM_H(0, (gpr)(int32_t)0x800BE4F8) = MEM_HU(0, (gpr)(int32_t)0x800BE4F8) | buttons; } } if (!warped) { extern char* getenv(const char*); extern int atoi(const char*); char* e = getenv("MM_WARP"); char* se = getenv("MM_WARP_STAGE"); if (e != 0 || se != 0) { char* a = getenv("MM_WARP_AT"); int at = a ? atoi(a) : 1; char* d = getenv("MM_WARP_DELAY"); int dl = d ? atoi(d) : 90; int gs = MEM_HU(0, (gpr)(int32_t)0x800BE4F0); if (gs == at && fc > dl) { int requested_scene = e ? atoi(e) : -1; int requested_stage = se ? atoi(se) : -1; extern int mm_debug_warp_prepare(uint8_t*, int, int); int warp_scene = mm_debug_warp_prepare(rdram, requested_scene, requested_stage); MEM_H(0, (gpr)(int32_t)0x800BE5D0) = (int16_t)warp_scene; MEM_H(0, (gpr)(int32_t)0x800BE4EC) = 0; MEM_H(0, (gpr)(int32_t)0x800D2908) = 1; MEM_H(0, (gpr)(int32_t)0x800BE4F0) = 5; MEM_H(0, (gpr)(int32_t)0x800BE4F4) = 0; { int i; for (i = 0; i < 0x1000; i++) { MEM_W(i*4, (gpr)(int32_t)0x8027CEE8) = 0; } for (i = 0; i < 0xC00; i++) { MEM_W(i*4, (gpr)(int32_t)0x8027EEE8) = 0; } } warped = 1; } } } }' },
    { func = "func_80082820", text = '{ if ((uint32_t)ctx->r5 == 0x80180D90u) { gpr b = ctx->r5; gpr s = (gpr)(int32_t)0x9FFFF000; static int wingsoff = -1; if (wingsoff < 0) { extern char* getenv(const char*); char* wv = getenv("MM_BAND_WINGS"); wingsoff = (wv && wv[0] == 0x31) ? 0 : 1; } gpr P = MEM_W(0, (gpr)(int32_t)0x80137470); uint32_t Pu = (uint32_t)P; int scene = (int)(int16_t)MEM_HU(0, (gpr)(int32_t)0x800BE5D0); extern int mm_widescreen_gameplay_active(uint8_t*); int gamewide = mm_widescreen_gameplay_active(rdram); int mapok = (!wingsoff) && gamewide && ((scene != 0) && (scene != 10) && (scene != 20) && (scene != 23) && (scene != 24) && (scene != 36) && (scene != 40) && (scene != 42) && (scene != 46) && (scene != 47) && (scene != 48) && (scene != 52) && (scene != 53) && (scene != 54) && (scene != 55) && (scene != 57) && (scene != 65) && (scene != 68) && (scene != 71) && (scene != 77) && (scene != 78)) && (Pu >= 0x80000000u) && (Pu < 0x80800000u); int add = MEM_HU(0, (gpr)(int32_t)0x80137478); uint32_t texbase = (uint32_t)MEM_W(0, (gpr)(int32_t)0x80180FC0); int sy0 = ((-0xC) - (int)MEM_HU(0, (gpr)(int32_t)0x800BE584)) & 0x1FF; int r; int w; for (r = 0; r < 7; r++) { int syr = sy0 + r*32; int rowblk = (syr >> 1) & 0xF0; int sx0 = ((int)MEM_HU(0, (gpr)(int32_t)(0x8011D3B0 + r*4)) - 2) & 0x1FF; for (w = 0; w < 20; w++) { int x = w - 5; int32_t v; if (x >= 0 && x < 10) { v = MEM_W((r*10 + x)*4, b); } else if (mapok) { int srcX = sx0 + x*32 + 512; int col = (srcX >> 5) & 0xF; int mb = MEM_BU(col + rowblk, P); v = mb ? (int32_t)((((uint32_t)((mb + add) & 0xFFFF)) << 10) + texbase) : 0; } else { v = 0; } MEM_W((r*20 + w)*4, s) = v; } } ctx->r5 = s; } }' },
    { func = "func_80082380", text = '{ uint32_t buf = (uint32_t)ctx->r7; extern int mm_widescreen_gameplay_active(uint8_t*); int gamewide = mm_widescreen_gameplay_active(rdram); { gpr b = ctx->r7; uint32_t texbase = (uint32_t)MEM_W(0, (gpr)(int32_t)0x80180FC0); gpr s; int r; int w; if (buf == 0x80180B60u) { s = (gpr)(int32_t)0x9FFFD000; static int envoff = -1; if (envoff < 0) { extern char* getenv(const char*); char* wv = getenv("MM_ENV_WINGS"); envoff = (wv && wv[0] == 0x31) ? 0 : 1; } int sel = MEM_HU(0, (gpr)(int32_t)0x800BE58C); gpr P = MEM_W(0, (gpr)(int32_t)0x8013746C); uint32_t Pu = (uint32_t)P; int scene = (int)(int16_t)MEM_HU(0, (gpr)(int32_t)0x800BE5D0); int mapok = (!envoff) && gamewide && (scene != 0) && (scene != 36) && (scene != 39) && (scene != 57) && (scene != 69) && (scene != 71) && (Pu >= 0x80000000u) && (Pu < 0x80800000u); int add = MEM_HU(0, (gpr)(int32_t)0x80137476); int wide = (sel == 1); int base = ((int)(int16_t)MEM_HU(0, (gpr)(int32_t)0x800BE578) - 2) & (wide ? 0xFFF : 0x1FF); int cb = base >> 5; int t0i = ((-0xC) - (int)(int16_t)MEM_HU(0, (gpr)(int32_t)0x800BE580)) & (wide ? 0xFF : 0x1FF); for (r = 0; r < 7; r++) { int tr = (t0i + r*32) & (wide ? 0xFF : 0x1FF); int rowblk = wide ? ((tr << 2) & 0x380) : ((tr >> 1) & 0xF0); for (w = 0; w < 20; w++) { int x = w - 5; int32_t v; if (x >= 0 && x < 10) { v = MEM_W((r*10 + x)*4, b); } else if (mapok) { int col = (cb + x + (wide ? 128 : 16)) & (wide ? 0x7F : 0x0F); int mb = MEM_BU(col + rowblk, P); v = mb ? (int32_t)((((uint32_t)((mb + add) & 0xFFFF)) << 10) + texbase) : 0; } else { v = 0; } MEM_W((r*20 + w)*4, s) = v; } } } else if (buf == 0x80180930u) { s = (gpr)(int32_t)0x9FFFE000; static int midoff = -1; if (midoff < 0) { extern char* getenv(const char*); char* wv = getenv("MM_MID_WINGS"); midoff = (wv && wv[0] == 0x31) ? 0 : 1; } int md = MEM_HU(0, (gpr)(int32_t)0x800BE588); int midscene = (int)(int16_t)MEM_HU(0, (gpr)(int32_t)0x800BE5D0); int mapok = (!midoff) && gamewide && (midscene != 0) &