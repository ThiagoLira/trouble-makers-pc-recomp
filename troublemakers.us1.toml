    { func = "func_8000DD6C", vram = 0x8000E9F0, value = 0x10000003 },

    # Actor_IsOutsideRegion(actor, len): shared |x| > 0x90+len test used by
    # 19 sites (positional SFX radius + a few behavior gates). 0x90 is the
    # 4:3 half-width+margin; raise to 0x1C0 so behavior gates remain active
    # for large entities crossing either widescreen wing.
    { func = "Actor_IsOutsideRegion", vram = 0x80028924, value = 0x270901C0 }, # +0x90 -> +0x1C0
    { func = "Actor_IsOutsideRegion", vram = 0x80028938, value = 0x240AFE40 }, # -0x90 -> -0x1C0

    # func_8000FBF4: the shared actor-list builder performs a second screen-X
    # rejection after ACTOR_FLAG_DRAW has already been set. Rejected actors
    # never reach the depth-sorted lists consumed by func_80009BE8, which is
    # why traces showed the house NPCs alive/draw-enabled while their sprites
    # vanished at the old 4:3 edge. Widen both horizontal paths (graphicFlags
    # bit 0x800 and the regular sprite path); keep the vertical limits intact.
    { func = "func_8000FBF4", vram = 0x80010344, value = 0x29E101C1 }, # flagged right  +0xC0 -> +0x1C0
    { func = "func_8000FBF4", vram = 0x80010374, value = 0x2B01FE40 }, # flagged left   -0xC0 -> -0x1C0
    { func = "func_8000FBF4", vram = 0x800103E8, value = 0x2B0101C1 }, # regular right  +0xC0 -> +0x1C0
    { func = "func_8000FBF4", vram = 0x80010418, value = 0x29E1FE40 }, # regular left   -0xC0 -> -0x1C0

